# Intent-driven protocol.
# Input = INTENT; a spec is authored from it.
# Enforcement is on the OUTPUT (diff) + lightweight WARN-only spec manners.
# No hard pre-execute spec gates (they would block externally-authored intents).
# v2 (future): a dedicated spec-authoring mode + harder spec validators.

protocol_id: "intent"
name: "Intent-Driven Protocol"
version: "1.0.0"

modes:
  - mode_id: "producer"
    name: "Producer Mode"
    tools:
      - "edit"
      - "test"
      - "validate"
      - "commit"
    validators:
      - "spec-manners"
      - "review"
    transitions: {}

validators:
  - validator_id: "spec-manners"
    validator_type: "conventions"
    evaluation_phase: "pre_execute"
    severity_cap: "warn"          # nudges, never hard-blocks
    criteria:
      - "Treat the input as INTENT. A good spec, authored from it, restates the desired outcome in one or two sentences \u2014 not a copy of the raw issue."
      - "WARN if no explicit acceptance criterion is present (how we'll know it's resolved)."
      - "WARN if scope is unstated (which area/behavior the change should touch)."
      - "WARN if the spec is code-prescriptive (transcribed implementation) rather than intent + constraints."
      - "Do not block: these are good-manners nudges meant to improve the spec on the next iteration, not stop the work."

  - validator_id: "review"
    validator_type: "architecture"
    evaluation_phase: "post_execute"
    tools:
      - "read_diff_between_refs"   # REQUIRED: fetch the committed diff (HEAD~1..HEAD) to review
    criteria:
      - "You are reviewing a CODE DIFF that attempts to resolve the issue described in the task. Judge the diff, not the wording of the task."
      - "BLOCK if the diff is empty, unrelated to the issue, or clearly fails to address the described problem."
      - "BLOCK if the change introduces obvious breakage: syntax errors, undefined names, or removal of unrelated functionality."
      - "The fix should be minimal and focused on the issue; flag large unrelated rewrites as a concern."
      - "Do NOT require the author to add or modify tests \u2014 correctness is verified separately. Judge only whether the change plausibly and cleanly resolves the issue."

disagreement_policy: "unanimous"
initial_mode: "producer"

global_constraints:
  - constraint_id: "no_secrets"
    description: "No secrets or credentials in the produced diff"
    expression: "git diff has no credential patterns"
    severity: "blocker"
    predicate: "no_secrets_in_diff"
    params: {}
  - constraint_id: "files_in_scope"
    description: "All modified files stay within the repository (no escape)"
    expression: "artifact_paths all match scope_paths"
    severity: "blocker"
    predicate: "files_in_scope"
    params:
      scope_paths: ["**"]
