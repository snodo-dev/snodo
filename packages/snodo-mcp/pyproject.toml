[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "snodo-mcp"
version = "0.5.4"
description = "Snodo MCP — MCP servers, planning, recon, and jobs"
requires-python = ">=3.12"
license = { text = "AGPL-3.0-only" }
authors = [{ name = "The Snodo Authors", email = "noreply@snodo.dev" }]
dependencies = [
    "snodo-core==0.5.4",
    "snodo-tools==0.5.4",
    "snodo-foundation==0.5.4",
    "pydantic>=2.12.0",
    "mcp>=1.0.0",
    "PyGithub>=2.0.0",
    "GitPython>=3.1.0",
    "httpx>=0.27.0",
    "pyjwt>=2.8.0",
    "filelock>=3.0.0",
    "docker>=7.0.0",
]

[project.urls]
Homepage = "https://snodo.dev"
Repository = "https://github.com/snodo-dev/snodo"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
snodo = ["py.typed"]
