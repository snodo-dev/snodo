name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure git
        run: |
          git config --global user.email "ci@snodo.dev"
          git config --global user.name "snodo CI"
          git config --global init.defaultBranch main
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest tests/ -v -m "" --tb=short --timeout=60

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check snodo/
      - name: Architecture (import-linter)
        run: lint-imports
