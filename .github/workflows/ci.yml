name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure git
        run: |
          git config --global user.email "ci@snodo.dev"
          git config --global user.name "snodo CI"
          git config --global init.defaultBranch main
      - name: Install (uv workspace)
        run: uv sync --all-extras
      - name: Test + coverage
        run: >
          uv run pytest tests/ -m "" --tb=short --timeout=60
          --cov=snodo --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install (uv workspace)
        run: uv sync --all-extras
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Architecture (import-linter)
        run: uv run lint-imports
