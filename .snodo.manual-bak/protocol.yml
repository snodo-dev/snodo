protocol_id: "solo"
name: "Solo Developer Protocol"
version: "1.0.0"

modes:
  - mode_id: "producer"
    name: "Producer Mode"
    tools:
      - "edit"
      - "dispatch"
      - "resolve"
      - "test"
      - "validate"
      - "commit"
      - "merge"
    validators:
      - "security"
      - "architecture"
      - "adr"
      - "meta-spec"
      - "qa-unit"
      - "qa-lint"
    transitions: {}

validators:
- validator_id: "security"
  validator_type: "security"
  evaluation_phase: "pre_execute"
  criteria:
    - "API keys, secrets, and tokens must never be hardcoded in source code, logs, or responses — environment variables or config files only"
    - "No sensitive data (PII, tokens, credentials) must appear in logs, error messages, or test output"
    - "Input paths and user-supplied strings must be sanitized to prevent path traversal or injection"
    - "Authentication tokens must be validated on every incoming API request"
    - "HTTPS must be used for all external HTTP calls (no plain HTTP)"
    - "File system operations must validate paths against the project root"

- validator_id: "architecture"
  validator_type: "architecture"
  evaluation_phase: "pre_execute"
  criteria:
    - "Separation of concerns — CLI commands, protocol engine, validators, and MCP server are distinct modules with well-defined interfaces"
    - "The protocol engine must be importable as a library — no side effects at import time"
    - "MCP server is a standalone process that communicates via stdio JSON-RPC (the MCP protocol)"
    - "Shared logic must be extracted to modules, not duplicated across CLI commands or engine modules"
    - "No circular dependencies between modules"
    - "Error handling must be explicit at every async boundary — no unhandled exceptions"
    - "Configuration values (URLs, timeouts, paths) must be in config/env — never hardcoded"
    - "File system state (.snodo directory, worktrees) must be managed through a single access layer"

- validator_id: "adr"
  validator_type: "architecture"
  evaluation_phase: "pre_execute"
  tools: ["read_file", "list_files"]
  criteria:
    - "All architectural decisions must conform to the Architecture Decision Records in docs/decisions/ or docs/adr/. Read the relevant ADR(s) rather than assuming specific values."
    - "When multiple ADRs apply, the highest-numbered (most recent) ADR on a given topic takes precedence unless an ADR explicitly supersedes another."
    - "Cross-cutting invariants: the CLI must never modify the protocol engine or audit.log format directly; protocol.yml governs all modes, validators, and disagreement policies; the audit.log is hash-chained and append-only"
    - "Any deviation from an ADR requires updating or superseding the ADR first — never work around it in code or specs"

- validator_id: "meta-spec"
  validator_type: "architecture"
  evaluation_phase: "pre_execute"
  criteria:
    - "The task spec must define INTENT and CONSTRAINTS — what to build and the boundaries it must respect — and leave implementation decisions to the coder. A spec describes behavior and contracts; it does not transcribe the implementation."
    - "ALLOWED in a spec (these are constraints, not implementation): function and method signatures, exported names, type and interface shapes, behavioral requirements (what it must do, what inputs it must reject), hard constraints (algorithm choice, framework limits, dependency restrictions), specific required values that are genuine requirements (e.g. a 7-day expiry, a max-age), acceptance criteria, and occasional short code hints that clarify a constraint."
    - "PROHIBITED in a spec (this is the coder's job): literal function bodies, transcribed implementation logic, exact statement-by-statement code the coder should author, regex literals and exact API-call sequences presented as the implementation, and any spec that leaves the coder no implementation decisions to make."
    - "Guideline for judgment: if more than roughly 40% of the spec is literal implementation code rather than intent, contracts, and constraints, the spec is code-prescriptive and must be rejected as a blocker. The orchestrator must re-issue the task as intent plus constraints, not as transcribed code."
    - "A correctly-scoped spec leaves the coder room to author the implementation while still being unambiguous about what 'done' means. Reject specs that read as code wearing a spec's clothes."

- validator_id: "qa-unit"
  validator_type: "quality"
  evaluation_phase: "post_execute"
  tooling:
    test_command: "pytest --cov --cov-report=term-missing -x"

- validator_id: "qa-lint"
  validator_type: "quality"
  evaluation_phase: "post_execute"
  tooling:
    test_command: "ruff check ."

disagreement_policy: "majority"
initial_mode: "producer"

global_constraints: []
